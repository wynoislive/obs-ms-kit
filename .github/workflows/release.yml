name: Build & Release Engine

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Package and Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_name: obs-ms-kit-windows-x64
            extension: zip
          - os: macos-14
            artifact_name: obs-ms-kit-macos-arm64
            extension: dmg
          - os: ubuntu-24.04
            artifact_name: obs-ms-kit-ubuntu-x64
            extension: deb

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 1. Initialize MSVC Environment (Windows Only)
      - name: Set up MSVC Dev Cmd
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 2. Setup Qt6 Run-times (Windows & macOS Only)
      - name: Install Qt6
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.3'
          host: ${{ runner.os == 'Windows' && 'windows' || 'mac' }}
          target: 'desktop'
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2022_64' || 'clang_64' }}
          dir: '${{ github.workspace }}/qt'

      # 3. Restore Linux Ingest Environments (Ubuntu Only)
      - name: Install Linux Build Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libobs-dev qt6-base-dev qt6-base-private-dev build-essential cmake ninja-build

      # 4. Fetch libobs Core Headers (Windows Only)
      - name: Fetch libobs Dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path deps
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-studio/releases/download/30.1.2/obs-studio-30.1.2-Full-x64.zip" -OutFile deps/obs.zip
          Expand-Archive -Path deps/obs.zip -DestinationPath deps/obs-studio
          
          # Fix: Use explicit UTF-8 piping to avoid PowerShell UTF-16 BOM syntax corruption
          "OBS_DEP_PATH=${{ github.workspace }}/deps/obs-studio" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # 5. Execute OS-Specific Configurations
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cmake -B build_x64 -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -Dobs-studio_DIR="${{ env.OBS_DEP_PATH }}/cmake/obs-studio"

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build_x64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQt6_DIR="${{ github.workspace }}/qt/Qt/6.6.3/macos/lib/cmake/Qt6"

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build_x64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      # 6. Build the Engine Binaries
      - name: Build Target
        run: cmake --build build_x64 --config Release --parallel

      # 7. Package the Distribution (Invokes our custom CPack rules)
      - name: Run CPack Packaging
        run: |
          cd build_x64
          cpack -C Release

      # 8. Align Output Artifacts to Workspace Root
      - name: Prepare Windows Package
        if: runner.os == 'Windows'
        shell: powershell
        run: Move-Item build_x64/*.zip ${{ matrix.artifact_name }}.zip

      - name: Prepare macOS DMG Package
        if: runner.os == 'macOS'
        run: mv build_x64/*.dmg ${{ matrix.artifact_name }}.dmg

      - name: Prepare Linux DEB Package
        if: runner.os == 'Linux'
        run: mv build_x64/*.deb ${{ matrix.artifact_name }}.deb

      # 9. Push Compiled Installer to Github Releases
      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}.${{ matrix.extension }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
